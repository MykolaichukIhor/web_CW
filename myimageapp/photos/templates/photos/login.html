<!DOCTYPE html>
<html data-bs-theme="light">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    {% load i18n %}
    <title>{% trans "Log in" %}</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
        body {
            background: #f8f9fa;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #6c757d;
            z-index: 5;
        }
        .toggle-password:hover {
            color: #495057;
        }
        
        
        [data-bs-theme="dark"] body {
            background: #000000;
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .card {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        [data-bs-theme="dark"] .card-header {
            background-color: rgba(255, 255, 255, 0.08);
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }
        
        [data-bs-theme="dark"] .card-header h3 {
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .form-label {
            color: rgba(255, 255, 255, 0.8);
        }
        
        [data-bs-theme="dark"] .form-control {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        
        [data-bs-theme="dark"] .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        [data-bs-theme="dark"] .toggle-password {
            color: rgba(255, 255, 255, 0.5);
        }
        
        [data-bs-theme="dark"] .toggle-password:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        
        [data-bs-theme="dark"] a {
            color: #6ea8fe;
        }
        
        [data-bs-theme="dark"] a:hover {
            color: #8bb9fe;
        }
        
        [data-bs-theme="dark"] hr {
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        [data-bs-theme="dark"] .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            border-color: rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
        }
        
        
        .theme-toggle-btn {
            background: none;
            border: none;
            color: #212529;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
        }
        
        .theme-toggle-btn:hover {
            opacity: 0.7;
        }
        
        [data-bs-theme="dark"] .theme-toggle-btn {
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .form-select {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] select option {
            background: #1a1a2e;
            color: #ffffff;
        }
    </style>
</head>
<body class="m-5">
    <div class="container">
        <div class="d-flex justify-content-end mb-3 align-items-center gap-3">
            <button class="theme-toggle-btn" id="themeToggle" title="{% trans 'Toggle theme' %}">
                <i class="fas fa-moon"></i>
            </button>
            <form action="{% url 'set_language' %}" method="post" id="lang-form" class="d-inline">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ redirect_to }}" />
                <select name="language" onchange="document.getElementById('lang-form').submit();" class="form-select form-select-sm">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% get_language_info_list for LANGUAGES as languages %}
                    {% for language in languages %}
                        <option value="{{ language.code }}"{% if language.code == LANGUAGE_CODE %} selected{% endif %}>
                            {{ language.name_local }}
                        </option>
                    {% endfor %}
                </select>
            </form>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>{% trans "Log in" %}</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" class="login-form">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="id_username" class="form-label">{% trans "Username" %}</label>
                                <input type="text" name="username" id="id_username" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="id_password" class="form-label">{% trans "Password" %}</label>
                                <div class="password-wrapper">
                                    <input type="password" name="password" id="id_password" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword()" tabindex="-1">
                                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary" style="width: 50%;">{% trans "Login" %}</button>
                            </div>
                        </form>
                        <hr>
                        <p>{% trans "Don't have an account?" %} <a href="{% url 'signup' %}">{% trans "Sign up here" %}</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-bs-theme', savedTheme);
            updateThemeIcon(savedTheme);
            
            themeToggle.addEventListener('click', function() {
                const currentTheme = html.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                html.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
            
            function updateThemeIcon(theme) {
                const icon = themeToggle.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'fas fa-sun';
                    themeToggle.title = 'Switch to light theme';
                } else {
                    icon.className = 'fas fa-moon';
                    themeToggle.title = 'Switch to dark theme';
                }
            }
        })();
        
        
        function togglePassword() {
            const passwordInput = document.getElementById('id_password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                `;
            }
        }
    </script>
</body>
</html>
