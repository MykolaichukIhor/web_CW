<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Delete Photo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .card {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .card-body {
            color: #f0f0f0;
            padding: 25px;
        }
        
        h5 {
            color: #fff;
            font-weight: 500;
        }
        
        .text-danger {
            color: #ff4757 !important;
            font-weight: 500;
        }
        
        img {
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        
        img:hover {
            transform: scale(1.02);
        }
        
        .btn {
            border-radius: 12px;
            padding: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #c0392b);
            border: none;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,71,87,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        @media (max-width: 576px) {
            .card-body {
                padding: 20px;
            }
            
            .btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body class="p-3">
    <div class="container">
        <div class="card">
            <div class="card-body text-center">
                <img src="{{ photo.image.url }}" alt="Photo" class="img-fluid mb-3 rounded">
                
                <h5 class="mb-3">{{ photo.description|default:"Photo" }}</h5>
                
                <p class="text-danger">Delete this photo?</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'gallery' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
