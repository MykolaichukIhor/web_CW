<!DOCTYPE html>
<html data-bs-theme="light">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    {% load i18n %}
    <title>{% trans "Upload Photo" %}</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
        body {
            background: #f8f9fa;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        
        [data-bs-theme="dark"] body {
            background: #000000;
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .card {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        [data-bs-theme="dark"] .card-header {
            background-color: rgba(255, 255, 255, 0.08);
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }
        
        [data-bs-theme="dark"] .card-header h3 {
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .form-label {
            color: rgba(255, 255, 255, 0.8);
        }
        
        [data-bs-theme="dark"] .form-control,
        [data-bs-theme="dark"] .form-select {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .form-control:focus,
        [data-bs-theme="dark"] .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        
        [data-bs-theme="dark"] .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        
        [data-bs-theme="dark"] select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] select.form-select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        
        
        [data-bs-theme="dark"] input[type="file"] {
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-radius: 4px;
            padding: 4px 12px;
            margin-right: 8px;
        }
        
        [data-bs-theme="dark"] input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        
        [data-bs-theme="dark"] textarea.form-control {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] textarea.form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
        }
        
        [data-bs-theme="dark"] .btn-dark {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        [data-bs-theme="dark"] .btn-dark:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
        }
        
        
        .theme-toggle-btn {
            background: none;
            border: none;
            color: #212529;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
        }
        
        .theme-toggle-btn:hover {
            opacity: 0.7;
        }
        
        [data-bs-theme="dark"] .theme-toggle-btn {
            color: #ffffff;
        }
    </style>
</head>
<body class="m-5">
    <div class="container">
        <div class="d-flex justify-content-end mb-3 align-items-center gap-3">
            <button class="theme-toggle-btn" id="themeToggle" title="{% trans 'Toggle theme' %}">
                <i class="fas fa-moon"></i>
            </button>
            <form action="{% url 'set_language' %}" method="post" id="lang-form" class="d-inline">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ redirect_to }}" />
                <select name="language" onchange="document.getElementById('lang-form').submit();" class="form-select form-select-sm">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% get_language_info_list for LANGUAGES as languages %}
                    {% for language in languages %}
                        <option value="{{ language.code }}"{% if language.code == LANGUAGE_CODE %} selected{% endif %}>
                            {{ language.name_local }}
                        </option>
                    {% endfor %}
                </select>
            </form>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <a href="{% url 'gallery' %}" class="btn btn-dark mb-3">{% trans "Back to Gallery" %}</a>
                <div class="card">
                    <div class="card-header">
                        <h3>{% trans "Upload Photo" %}</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="form-group mb-3">
                                <label for="id_image" class="form-label">{% trans "Image" %}</label>
                                {{ form.image }}
                            </div>
                            <div class="form-group mb-3">
                                <label for="id_description" class="form-label">{% trans "Description" %}</label>
                                {{ form.description }}
                            </div>
                            <div class="form-group mb-3">
                                <label for="id_category" class="form-label">{% trans "Category" %}</label>
                                {{ form.category }}
                            </div>
                            <div class="form-group mb-3">
                                <label for="id_category_new" class="form-label">{% trans "Or create new category" %}</label>
                                {{ form.category_new }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100">{% trans "Upload" %}</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            const savedTheme = localStorage.getItem('theme') || 'light';
            html.setAttribute('data-bs-theme', savedTheme);
            updateThemeIcon(savedTheme);
            
            themeToggle.addEventListener('click', function() {
                const currentTheme = html.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                html.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
            
            function updateThemeIcon(theme) {
                const icon = themeToggle.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'fas fa-sun';
                    themeToggle.title = 'Switch to light theme';
                } else {
                    icon.className = 'fas fa-moon';
                    themeToggle.title = 'Switch to dark theme';
                }
            }
        })();
    </script>
</body>
</html>
