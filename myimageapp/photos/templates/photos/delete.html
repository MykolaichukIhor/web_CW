<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Delete Photo</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="m-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>Delete Photo</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <img src="{{ photo.image.url }}" alt="Photo" class="img-fluid">
                        </div>
                        <p>Are you sure you want to delete this photo?</p>
                        <p><strong>Description:</strong> {{ photo.description|default:"No description" }}</p>
                        <p><strong>Category:</strong> {{ photo.category.name|default:"None" }}</p>
                        <form method="POST">
                            {% csrf_token %}
                            <a href="{% url 'gallery' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
