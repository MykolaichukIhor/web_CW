<!--
    Photo Detail Page - Mobile Optimized Version
    Lightweight mobile-first design with touch-optimized interface,
    collapsible panels, and gesture-friendly interactions.
    Designed for mobile browsers with safe area support.
-->
{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>{% trans "Photo View - Mobile" %}</title>
    
    <!-- 
        Mobile-optimized viewport settings
        viewport-fit=cover allows content to extend into notch/safe areas
        maximum-scale=1.0 prevents unwanted zooming
        user-scalable=yes still allows accessibility zooming
    -->
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover'>
    
    <!-- Bootstrap CSS for base styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.4.0 for icons (lighter alternative to Bootstrap Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 
        Critical theme detection script (runs before page render)
        Prevents flash of wrong theme (FOWT) by setting theme immediately
        Uses both saved preference and system preference as fallback
    -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            // Priority: saved preference > system preference > light theme
            const theme = savedTheme ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>

    <style>
        /*
         * CSS Custom Properties for theming
         * Using CSS variables allows instant theme switching without !important overrides
         * Light theme uses warm white (#fffff0) for reduced eye strain
         * Dark theme uses pure black (#000000) for OLED power saving
         */
        :root {
            /* Light theme variables (default) */
            --bg-main: #fffff0;
            --panel-bg: rgba(255, 255, 240, 0.85);
            --text-main: #212529;
            --text-muted: rgba(0, 0, 0, 0.6);
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-bg-active: rgba(0, 0, 0, 0.15);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        [data-bs-theme="dark"] {
            /* Dark theme variables */
            --bg-main: #000000;
            --panel-bg: rgba(0, 0, 0, 0.85);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-bg-active: rgba(255, 255, 255, 0.25);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* Reset all margins and padding for full-screen experience */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 
                Disable tap highlight on mobile devices
                Removes default blue/gray highlight when tapping elements
                Improves visual feedback when using custom active states
            */
            -webkit-tap-highlight-color: transparent;
        }
        
        /*
         * Body fills entire viewport
         * overflow: hidden prevents scrolling (photo takes full screen)
         * Transitions for smooth theme switching
         */
        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /*
         * TOP PANEL - Fixed header with photo info
         * Includes safe area padding for notched devices
         * backdrop-filter creates frosted glass effect
         * hidden class slides panel up out of view
         */
        .top-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); /* Safari support */
            z-index: 100;
            padding: 12px 16px;
            /* 
                env(safe-area-inset-top) adds padding for iPhone notch
                max() ensures at least 12px padding even without notch
            */
            padding-top: max(12px, env(safe-area-inset-top));
            transition: transform 0.3s ease, background 0.3s ease;
            border-bottom: 0.5px solid var(--border-color);
        }
        
        /* 
            Hidden state for panel toggle
            translateY(-100%) moves panel completely off screen
        */
        .top-panel.hidden {
            transform: translateY(-100%);
        }
        
        /* Flex container for top panel content */
        .top-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /*
         * Back button - circular design for touch targets
         * Minimum 36x36px for comfortable tapping (Apple HIG recommends 44px minimum)
         */
        .back-btn {
            background: var(--btn-bg);
            border: none;
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            flex-shrink: 0;
        }
        
        /* Active state provides visual feedback for touch */
        .back-btn:active {
            background: var(--btn-bg-active);
            transform: scale(0.95);
        }
        
        /* Photo info container with text truncation */
        .photo-info {
            flex: 1;
            min-width: 0; /* Required for text-overflow to work in flex container */
        }
        
        /*
         * Photo title with ellipsis for overflow
         * white-space: nowrap keeps title on one line
         */
        .photo-title {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
            line-height: 1.2;
        }
        
        /* Subtitle with muted color for date display */
        .photo-date {
            color: var(--text-muted);
            font-size: 12px;
            margin: 0;
            line-height: 1.3;
        }
        
        /*
         * PHOTO MAIN AREA
         * Centered full-screen photo display
         * z-index: 1 ensures panels overlay the photo
         */
        .photo-main {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        
        /*
         * Photo image constraints
         * object-fit: contain maintains aspect ratio
         * user-select: none prevents accidental text selection during swipe
         */
        .photo-image {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: opacity 0.2s;
            user-select: none;
            -webkit-user-select: none; /* Safari support */
        }
        
        /*
         * BOTTOM PANEL - Action buttons area
         * Fixed to bottom with safe area support
         * Additional padding for home indicator on iPhone X+
         */
        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            padding: 12px 16px;
            /* 
                Extra bottom padding for home indicator
                calc adds 20px to safe area inset for comfortable spacing
            */
            padding-bottom: max(30px, calc(env(safe-area-inset-bottom) + 20px));
            transition: transform 0.3s ease, background 0.3s ease;
            border-top: 0.5px solid var(--border-color);
        }
        
        /* Hidden state slides panel down off screen */
        .bottom-panel.hidden {
            transform: translateY(100%);
        }
        
        /* Action buttons container with even spacing */
        .bottom-actions {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 20px;
        }
        
        /*
         * Individual action buttons
         * 44x44px minimum for comfortable touch targets
         * Relative positioning for label placement
         */
        .action-btn {
            background: none;
            border: none;
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 20px;
            position: relative;
        }
        
        /* Touch feedback with scale animation */
        .action-btn:active {
            background: var(--btn-bg-active);
            transform: scale(0.95);
        }
        
        /* Active state for toggle buttons (e.g., favorite) */
        .action-btn.active {
            color: #ff4757;
        }
        
        /*
         * Button labels positioned below each button
         * Absolute positioning prevents affecting button size
         * translateX(-50%) centers text under button
         */
        .btn-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <!-- 
        TOP PANEL - Fixed header with back navigation and photo metadata
        Initially visible, toggles on photo tap
    -->
    <div class="top-panel" id="topPanel">
        <div class="top-content">
            <!-- Back button navigates to mobile gallery view -->
            <a href="{% url 'gallery_mobile' %}" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="photo-info">
                <!-- 
                    Photo title uses description if available
                    Falls back to generic "Photo" text 
                -->
                <h2 class="photo-title">
                    {% if photo.description %}
                        {{ photo.description }}
                    {% else %}
                        {% trans "Photo" %}
                    {% endif %}
                </h2>
                <!-- Upload date formatted for mobile display -->
                <p class="photo-date">{{ photo.created_at|date:"M d, Y H:i" }}</p>
            </div>
        </div>
    </div>
    
    <!-- 
        PHOTO MAIN AREA
        Full-screen photo display with tap-to-toggle-panels functionality
        Image loads with fade-in effect
    -->
    <div class="photo-main" id="photoMain">
        <img src="{{ photo.image.url }}" 
             alt="{% if photo.description %}{{ photo.description }}{% else %}{% trans 'Photo' %}{% endif %}"
             class="photo-image"
             id="mainImage">
    </div>
    
    <!-- 
        BOTTOM PANEL - Action buttons
        Initially visible, toggles on photo tap
        Includes Edit, Favorite, and Delete actions
    -->
    <div class="bottom-panel" id="bottomPanel">
        <div class="bottom-actions">
            <!-- 
                Edit button navigates to mobile edit page
                Inline onclick for simpler mobile handling
            -->
            <button class="action-btn" id="editBtn" onclick="location.href='{% url 'edit_mobile' photo.id %}'">
                <i class="fas fa-pen"></i>
                <span class="btn-label">{% trans "Edit" %}</span>
            </button>
            
            <!-- 
                Favorite button with toggle functionality
                Uses outline heart icon (far) initially
                Could switch to filled heart (fas) when active
            -->
            <button class="action-btn" id="favoriteBtn" onclick="toggleFavorite()">
                <i class="far fa-heart"></i>
                <span class="btn-label">{% trans "Favorite" %}</span>
            </button>
            
            <!-- 
                Delete button navigates to mobile delete confirmation
                No inline confirmation dialog for better mobile UX
                Delete confirmation handled on separate page
            -->
            <button class="action-btn" id="deleteBtn" onclick="location.href='{% url 'delete_mobile' photo.id %}'">
                <i class="fas fa-trash"></i>
                <span class="btn-label">{% trans "Delete" %}</span>
            </button>
        </div>
    </div>

    <script>
        // DOM element references for panel toggle functionality
        const topPanel = document.getElementById('topPanel');
        const bottomPanel = document.getElementById('bottomPanel');
        const mainImage = document.getElementById('mainImage');
        
        /*
         * Panel visibility state tracker
         * true = panels visible, false = panels hidden
         * Default state is visible for initial page load
         */
        let panelsVisible = true;
        
        /*
         * Toggles top and bottom panels visibility
         * Creates immersive full-screen photo viewing experience
         * Panels slide off screen with CSS transitions
         */
        function togglePanels() {
            panelsVisible = !panelsVisible;
            if (panelsVisible) {
                topPanel.classList.remove('hidden');
                bottomPanel.classList.remove('hidden');
            } else {
                topPanel.classList.add('hidden');
                bottomPanel.classList.add('hidden');
            }
        }
        
        /*
         * Tap handler on photo to toggle panels
         * e.stopPropagation() prevents event bubbling
         * This is the primary mobile interaction pattern
         */
        mainImage.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePanels();
        });
        
        /*
         * IMAGE LOADING OPTIMIZATION
         * Fade-in effect for smooth visual transition
         * Handles both cached and freshly loaded images
         * Prevents white flash while image loads
         */
        mainImage.style.opacity = '0';
        mainImage.onload = () => {
            mainImage.style.transition = 'opacity 0.3s';
            mainImage.style.opacity = '1';
        };
        
        /*
         * Check if image loaded from cache
         * If complete property is true, image is already loaded
         * Set opacity to 1 immediately to avoid delay
         */
        if (mainImage.complete) {
            mainImage.style.opacity = '1';
        }
        
        /*
         * FAVORITE TOGGLE (Placeholder)
         * Currently shows alert as feature not yet implemented
         * Future implementation would toggle heart icon and store preference
         */
        function toggleFavorite() {
            alert('{% trans "Favorites feature coming soon!" %}');
        }
    </script>
</body>
</html>
