<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Upload Photo - Mobile</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        
        .mobile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .back-btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.95);
        }
        
        .header-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin: 0;
        }
        
        
        .upload-container {
            margin-top: 68px;
            padding: 16px;
            padding-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .card-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
        }
        
        .card-header h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .card-body {
            padding: 20px;
        }
        
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }
        
        
        .file-input-wrapper {
            position: relative;
            width: 100%;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        
        .image-preview {
            margin-top: 16px;
            display: none;
            position: relative;
        }
        
        .image-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .remove-preview {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        
        .camera-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .camera-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .camera-btn i {
            font-size: 18px;
        }
        
        .camera-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.97);
        }
        
        
        input[type="text"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #0d6efd;
            background: rgba(255, 255, 255, 0.15);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        input[type="text"]::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
        }
        
        select option {
            background: #1a1a1a;
            color: white;
        }
        
        
        #id_description,
        #id_category,
        #id_category_new {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        #id_description:focus,
        #id_category:focus,
        #id_category_new:focus {
            outline: none;
            border-color: #0d6efd;
            background: rgba(255, 255, 255, 0.15);
        }
        
        #id_description::placeholder,
        #id_category_new::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        
        .upload-submit {
            background: #0d6efd;
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .upload-submit:active {
            transform: scale(0.98);
            background: #0b5ed7;
        }
        
        
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1100;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    
    <div class="mobile-header">
        <div class="header-content">
            <a href="{% url 'gallery' %}" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="header-title">Upload Photo</h1>
        </div>
    </div>

    
    <div class="upload-container">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-cloud-upload-alt me-2"></i> Add New Photo</h3>
            </div>
            <div class="card-body">
                
                <div class="camera-buttons">
                    <button type="button" class="camera-btn" id="takePhotoBtn">
                        <i class="fas fa-camera"></i>
                        <span>Take Photo</span>
                    </button>
                    <button type="button" class="camera-btn" id="chooseFromGalleryBtn">
                        <i class="fas fa-images"></i>
                        <span>Choose from Gallery</span>
                    </button>
                </div>
                
                <form method="POST" enctype="multipart/form-data" id="uploadForm">
                    {% csrf_token %}
                    
                    
                    <div class="file-input-wrapper">
                        {{ form.image }}
                    </div>
                    
                    
                    <div class="image-preview" id="imagePreview">
                        <img id="previewImg" src="" alt="Preview">
                        <button type="button" class="remove-preview" id="removePreviewBtn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-pen me-1"></i> Description
                        </label>
                        {{ form.description }}
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-tag me-1"></i> Category
                        </label>
                        {{ form.category }}
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-plus-circle me-1"></i> Or create new category
                        </label>
                        {{ form.category_new }}
                    </div>
                    
                    <button type="submit" class="upload-submit">
                        <i class="fas fa-upload"></i>
                        <span>Upload Photo</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        
        const fileInput = document.querySelector('#id_image');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removePreviewBtn = document.getElementById('removePreviewBtn');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const chooseFromGalleryBtn = document.getElementById('chooseFromGalleryBtn');
        const uploadForm = document.getElementById('uploadForm');
        
        
        function showPreview(file) {
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }
        
        
        function resetPreview() {
            imagePreview.style.display = 'none';
            previewImg.src = '';
            fileInput.value = '';
        }
        
        
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                showPreview(e.target.files[0]);
            }
        });
        
        
        removePreviewBtn.addEventListener('click', function() {
            resetPreview();
        });
        
        
        takePhotoBtn.addEventListener('click', function() {
            
            const tempInput = document.createElement('input');
            tempInput.type = 'file';
            tempInput.accept = 'image/*';
            tempInput.capture = 'environment';
            
            tempInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    
                    const file = e.target.files[0];
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                    showPreview(file);
                }
                tempInput.remove();
            });
            
            tempInput.click();
        });
        
        
        chooseFromGalleryBtn.addEventListener('click', function() {
            fileInput.click();
        });
        
        
        uploadForm.addEventListener('submit', function(e) {
            if (!fileInput.files || !fileInput.files[0]) {
                e.preventDefault();
                showToast('Please take a photo or select one from gallery!');
            }
        });
        
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        
        
        {% if messages %}
            {% for message in messages %}
                showToast('{{ message }}');
            {% endfor %}
        {% endif %}
    </script>
</body>
</html>
