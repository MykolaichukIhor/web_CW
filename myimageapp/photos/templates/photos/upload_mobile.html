<!--
    Photo Upload Page - Mobile Optimized Version
    Dark-themed interface with camera integration,
    image preview, and touch-friendly form controls.
    Designed specifically for mobile browsers with camera capture support.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Upload Photo - Mobile</title>
    
    <!-- 
        Mobile-optimized viewport
        viewport-fit=cover allows content behind notch
        maximum-scale=1.0 prevents unwanted zoom on input focus
    -->
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover'>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Reset box model and remove tap highlight for cleaner mobile experience */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 
            Body uses pure black for OLED power efficiency
            System font stack for native rendering
        */
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        /*
         * MOBILE HEADER - Fixed top bar
         * Frosted glass effect with backdrop blur
         * High z-index keeps it above all content
         */
        .mobile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Safari support */
            z-index: 1000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
        }
        
        /* Flex container for header elements */
        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        /*
         * Back button - circular design for easy tapping
         * 36x36px minimum touch target
         */
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        /* Active state provides tactile feedback */
        .back-btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.95);
        }
        
        /* Header title with subtle letter-spacing for modern look */
        .header-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin: 0;
        }
        
        /*
         * UPLOAD CONTAINER
         * Margin-top accounts for fixed header height
         * Extra bottom padding for comfortable scrolling
         */
        .upload-container {
            margin-top: 68px;
            padding: 16px;
            padding-bottom: 30px;
        }
        
        /* Card with dark semi-transparent styling */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        
        /* Card header with subtle background differentiation */
        .card-header {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
        }
        
        .card-header h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .card-body {
            padding: 20px;
        }
        
        /* Form group spacing */
        .form-group {
            margin-bottom: 20px;
        }
        
        /* Labels with muted white for visual hierarchy */
        .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }
        
        /*
         * FILE INPUT WRAPPER
         * Creates a clickable area over the file input
         * Actual input is transparent but captures clicks
         */
        .file-input-wrapper {
            position: relative;
            width: 100%;
        }
        
        /* 
            Hide default file input visually but keep it functional
            opacity: 0 makes it invisible but still clickable
            Positioned absolutely to cover the wrapper area
        */
        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        /*
         * IMAGE PREVIEW
         * Hidden by default, shown when file is selected
         * Displays thumbnail of selected image
         */
        .image-preview {
            margin-top: 16px;
            display: none;
            position: relative;
        }
        
        /* Preview image with consistent height and cover fit */
        .image-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }
        
        /*
         * Remove preview button
         * Positioned top-right on the preview image
         * Circular with dark semi-transparent background
         */
        .remove-preview {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /*
         * CAMERA BUTTONS
         * Two large buttons for photo source selection
         * Flex layout with equal widths
         */
        .camera-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        /*
         * Individual camera/gallery button
         * Rounded corners, semi-transparent background
         * flex: 1 ensures equal width distribution
         */
        .camera-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .camera-btn i {
            font-size: 18px;
        }
        
        /* Active state with scale animation for touch feedback */
        .camera-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.97);
        }
        
        /*
         * FORM INPUTS STYLING
         * Consistent dark theme across all input types
         * Rounded corners for modern mobile aesthetic
         */
        input[type="text"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        /* Focus state with blue border highlight */
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #0d6efd;
            background: rgba(255, 255, 255, 0.15);
        }
        
        /* Textarea allows vertical resize only for better UX */
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        /* Placeholder text with higher transparency for distinction */
        input[type="text"]::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* Select dropdown with pointer cursor */
        select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
        }
        
        /* Dropdown options with dark background */
        select option {
            background: #1a1a1a;
            color: white;
        }
        
        /*
         * DJANGO FORM FIELD TARGETING
         * Direct ID selectors for Django-rendered form fields
         * Ensures consistent styling with custom inputs
         */
        #id_description,
        #id_category,
        #id_category_new {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        #id_description:focus,
        #id_category:focus,
        #id_category_new:focus {
            outline: none;
            border-color: #0d6efd;
            background: rgba(255, 255, 255, 0.15);
        }
        
        #id_description::placeholder,
        #id_category_new::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        /*
         * SUBMIT BUTTON
         * Full-width blue button with icon
         * Primary call-to-action for form submission
         */
        .upload-submit {
            background: #0d6efd;
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        /* Active state with subtle scale and darker blue */
        .upload-submit:active {
            transform: scale(0.98);
            background: #0b5ed7;
        }
        
        /*
         * TOAST NOTIFICATION
         * Fixed position at bottom of screen
         * Centered horizontally with auto-width
         * Backdrop blur for frosted glass effect
         */
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1100;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <!-- 
        FIXED HEADER
        Contains back button and page title
        Always visible at top of screen
    -->
    <div class="mobile-header">
        <div class="header-content">
            <!-- Back navigation to gallery -->
            <a href="{% url 'gallery' %}" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="header-title">Upload Photo</h1>
        </div>
    </div>

    <!-- Main scrollable content area -->
    <div class="upload-container">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-cloud-upload-alt me-2"></i> Add New Photo</h3>
            </div>
            <div class="card-body">
                
                <!-- 
                    CAMERA/GALLERY BUTTONS
                    Two options for photo source:
                    1. Take Photo - opens device camera
                    2. Choose from Gallery - opens file picker
                -->
                <div class="camera-buttons">
                    <!-- Camera capture button with capture attribute for mobile -->
                    <button type="button" class="camera-btn" id="takePhotoBtn">
                        <i class="fas fa-camera"></i>
                        <span>Take Photo</span>
                    </button>
                    
                    <!-- Gallery picker button triggers file input -->
                    <button type="button" class="camera-btn" id="chooseFromGalleryBtn">
                        <i class="fas fa-images"></i>
                        <span>Choose from Gallery</span>
                    </button>
                </div>
                
                <!-- 
                    Upload form with CSRF protection
                    enctype="multipart/form-data" essential for file upload
                -->
                <form method="POST" enctype="multipart/form-data" id="uploadForm">
                    {% csrf_token %}
                    
                    <!-- 
                        File input wrapper with transparent overlay
                        Django's form.image renders the actual file input
                    -->
                    <div class="file-input-wrapper">
                        {{ form.image }}
                    </div>
                    
                    <!-- 
                        Image preview container
                        Shows selected image before upload
                        Initially hidden until file chosen
                    -->
                    <div class="image-preview" id="imagePreview">
                        <img id="previewImg" src="" alt="Preview">
                        <!-- Button to remove preview and clear file selection -->
                        <button type="button" class="remove-preview" id="removePreviewBtn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <!-- Description field -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-pen me-1"></i> Description
                        </label>
                        {{ form.description }}
                    </div>
                    
                    <!-- Category selection dropdown -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-tag me-1"></i> Category
                        </label>
                        {{ form.category }}
                    </div>
                    
                    <!-- 
                        New category input
                        Alternative to selecting existing category
                        Allows creating custom categories on-the-fly
                    -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-plus-circle me-1"></i> Or create new category
                        </label>
                        {{ form.category_new }}
                    </div>
                    
                    <!-- Submit button with upload icon -->
                    <button type="submit" class="upload-submit">
                        <i class="fas fa-upload"></i>
                        <span>Upload Photo</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // DOM element references for photo upload functionality
        const fileInput = document.querySelector('#id_image');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removePreviewBtn = document.getElementById('removePreviewBtn');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const chooseFromGalleryBtn = document.getElementById('chooseFromGalleryBtn');
        const uploadForm = document.getElementById('uploadForm');
        
        /*
         * IMAGE PREVIEW FUNCTIONALITY
         * Reads selected file and displays preview using FileReader API
         * Converts file to data URL for instant preview without server roundtrip
         */
        function showPreview(file) {
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    imagePreview.style.display = 'block';
                }
                // readAsDataURL converts binary file to base64 data URL
                reader.readAsDataURL(file);
            }
        }
        
        /*
         * Reset preview state
         * Hides preview, clears image source, and resets file input
         */
        function resetPreview() {
            imagePreview.style.display = 'none';
            previewImg.src = '';
            fileInput.value = '';
        }
        
        /*
         * File input change handler
         * Triggers preview when user selects a file
         */
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                showPreview(e.target.files[0]);
            }
        });
        
        /* Remove preview button click handler */
        removePreviewBtn.addEventListener('click', function() {
            resetPreview();
        });
        
        /*
         * TAKE PHOTO FUNCTIONALITY
         * Creates temporary file input with camera capture attribute
         * capture='environment' uses rear camera on mobile devices
         * After photo taken, transfers file to actual form input
         */
        takePhotoBtn.addEventListener('click', function() {
            // Create temporary input element for camera capture
            const tempInput = document.createElement('input');
            tempInput.type = 'file';
            tempInput.accept = 'image/*'; // Accept only image files
            
            // 
            
            tempInput.capture = 'environment'; // Use rear camera
            
            tempInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    /*
                     * Transfer file from temp input to actual form input
                     * DataTransfer API allows setting FileList programmatically
                     * This is necessary because direct file assignment is readonly
                     */
                    const file = e.target.files[0];
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                    showPreview(file);
                }
                // Clean up temporary element
                tempInput.remove();
            });
            
            // Programmatically trigger file picker
            tempInput.click();
        });
        
        /*
         * GALLERY BUTTON FUNCTIONALITY
         * Simply triggers click on hidden file input
         * Opens device's file picker/gallery
         */
        chooseFromGalleryBtn.addEventListener('click', function() {
            fileInput.click();
        });
        
        /*
         * FORM VALIDATION
         * Prevents submission if no file selected
         * Shows toast notification with error message
         */
        uploadForm.addEventListener('submit', function(e) {
            if (!fileInput.files || !fileInput.files[0]) {
                e.preventDefault();
                showToast('Please take a photo or select one from gallery!');
            }
        });
        
        /*
         * TOAST NOTIFICATION SYSTEM
         * Creates temporary notification at bottom of screen
         * Auto-removes after 2 seconds
         * Used for validation errors and success messages
         */
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>${message}`;
            document.body.appendChild(toast);
            
            // Auto-remove toast after 2 seconds
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        
        /*
         * DJANGO MESSAGES DISPLAY
         * Shows any Django framework messages as toasts
         * Useful for server-side validation feedback
         */
        {% if messages %}
            {% for message in messages %}
                showToast('{{ message }}');
            {% endfor %}
        {% endif %}
    </script>
</body>
</html>
